<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="quiz">
  <main class="appShell">
    <header class="hero compact">
      <div class="heroBar">
        <div>
          <h1 id="quizTitle">Quiz</h1>
          <p id="quizSubtitle"></p>
        </div>
        <a class="launcherBtn" href="https://kbystso-code.github.io/kids-app/" aria-label="Launcherへ戻る">🏠 Launcher</a>
      </div>
    </header>

    <section id="screen-quiz" class="panel screen active">
      <div class="topRow">
        <div>
          <div id="themeLabel" class="pill"></div>
          <h2 id="questionTitle">Aufgabe 1</h2>
        </div>

        <div class="topStatus">
          <div id="correctStat" class="miniStat correctStat">○ 0</div>
          <div id="wrongStat" class="miniStat wrongStat">× 0</div>
          <div id="progress" class="miniStat progressStat">1 / 20</div>
        </div>
      </div>

      <div id="prompt" class="prompt"></div>
      <div id="choices" class="choices"></div>
      <div id="feedback" class="feedback"></div>

      <div class="bottomActions">
        <button id="btnBackMenu" class="secondaryBtn">Menü</button>
        <button id="btnNext" class="primaryBtn" disabled>Weiter</button>
      </div>
    </section>

    <section id="screen-result" class="panel screen">
      <h2>Ergebnis</h2>
      <div id="resultScore" class="resultScore">0 / 20</div>
      <div id="resultDetail" class="resultDetail"></div>

      <div class="bottomActions">
        <button id="btnResultMenu" class="secondaryBtn">Menü</button>
        <button id="btnRetry" class="primaryBtn">Noch einmal</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
